name: CompassHotbar
version: 1.0.0
main: com.compasshotbar.CompassHotbar
api-version: '1.21'
description: Keep a compass in the last slot of the hotbar
author: Developer
commands:
  compasshotbar:
    description: Toggle compass hotbar feature
    usage: /compasshotbar
  compasshotbar reload:
    description: Reload the config
    usage: /compasshotbar reload
permissions:
  compasshotbar.use:
    description: Allows the player to use the compass hotbar feature
    default: true
  compasshotbar.command:
    description: Allows the player to toggle/configure the compass hotbar
    default: op